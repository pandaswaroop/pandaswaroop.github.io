<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Visualizer</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12c0 1.66-4.03 3-9 3s-9-1.34-9-3"/>
      <path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
      <ellipse cx="12" cy="5" rx="9" ry="3"/>
    </svg>
    <h1>Auto <span>Visualizer</span></h1>
  </header>

  <div class="container">
    <!-- Data Panel -->
    <div class="data-panel">
      <div class="panel-header">Dataset</div>

      <div class="drop-zone" id="dropZone">
        <input type="file" accept=".csv" id="fileInput">
        <div class="drop-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p><strong>Drop your CSV file here</strong><br>or click to browse</p>
        <p class="hint">.csv files only</p>
      </div>

      <div class="file-info" id="fileInfo">
        <span class="file-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
        </span>
        <div class="file-details">
          <div class="file-name" id="fileName"></div>
          <div class="file-meta" id="fileMeta"></div>
        </div>
        <button class="remove-btn" id="removeBtn" title="Remove file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="data-preview" id="dataPreview"></div>
      <div class="preview-footer" id="previewFooter"></div>
    </div>

    <!-- Chart Panel -->
    <div class="chart-panel">
      <div class="chart-toolbar">
        <span class="chart-type-badge" id="chartBadge"></span>
        <span class="chart-rationale" id="chartRationale"></span>
      </div>
      <div class="chart-area">
        <div class="chart-placeholder" id="chartPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M7 17l3-5 3 3 4-6"/>
          </svg>
          <p>Drop a CSV to generate a visualization</p>
        </div>
        <div class="spinner" id="spinner"></div>
        <div id="vega-chart"></div>
      </div>
    </div>
  </div>

  <div class="error-toast" id="errorToast"></div>

  <script src="app.js"></script>
</body>
</html>
